<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합회원 CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f16;--bg2:#111623;--bg3:#171d2e;--bg4:#1e2640;--bg5:#263050;
  --bdr:#232e48;--bdr2:#2e3b5c;
  --pri:#00b4d8;--pri-d:rgba(0,180,216,.1);--pri-m:rgba(0,180,216,.22);
  --acc:#48cae4;--sec:#0096c7;
  --mint:#06d6a0;--mint-d:rgba(6,214,160,.1);
  --coral:#ef476f;--coral-d:rgba(239,71,111,.1);
  --amber:#ffd166;--amber-d:rgba(255,209,102,.1);
  --purple:#a78bfa;--purple-d:rgba(167,139,250,.1);
  --txt:#e4e9f2;--txt2:#9aa4bc;--txt3:#6a7694;--txt4:#4a5572;
  --side:232px;--head:56px;--rad:8px;--rad-s:5px;
  --tr:.18s cubic-bezier(.4,0,.2,1);
}
html{font-size:13px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

.app{display:flex;min-height:100vh}

/* ══ Sidebar ══ */
.side{width:var(--side);background:var(--bg2);border-right:1px solid var(--bdr);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.side-logo{height:var(--head);display:flex;align-items:center;padding:0 16px;gap:8px;border-bottom:1px solid var(--bdr)}
.side-logo .ico{width:28px;height:28px;background:linear-gradient(135deg,var(--pri),var(--acc));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--bg)}
.side-logo span{font-weight:700;font-size:14px;background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.side-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-g{margin-bottom:14px}
.nav-g-label{font-size:9px;font-weight:700;color:var(--txt4);text-transform:uppercase;letter-spacing:1.2px;padding:0 10px;margin-bottom:4px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rad-s);cursor:pointer;transition:all var(--tr);color:var(--txt2);font-size:12px;position:relative}
.ni:hover{background:var(--bg3);color:var(--txt)}
.ni.act{background:var(--pri-d);color:var(--pri);font-weight:600}
.ni.act::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;background:var(--pri);border-radius:2px}
.ni svg{width:16px;height:16px;flex-shrink:0;opacity:.6}
.ni.act svg{opacity:1}
.ni .cnt{margin-left:auto;font-size:9px;font-weight:600;background:var(--bg4);color:var(--txt3);padding:1px 6px;border-radius:8px}
.ni.act .cnt{background:var(--pri-m);color:var(--pri)}
.ni-sub{padding-left:34px;font-size:11px}
.side-ft{padding:10px;border-top:1px solid var(--bdr)}
.side-ft .uc{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--rad-s);background:var(--bg3)}
.side-ft .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--mint));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bg)}
.side-ft .nm{font-size:11px;font-weight:600}.side-ft .rl{font-size:9px;color:var(--txt3)}

/* ══ Main ══ */
.mn{flex:1;margin-left:var(--side);display:flex;flex-direction:column}
.hd{height:var(--head);display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--bdr);background:var(--bg2);position:sticky;top:0;z-index:50}
.hd-title{font-size:15px;font-weight:700}
.hd-sub{font-size:11px;color:var(--txt3);margin-top:1px}
.hd-r{display:flex;gap:8px}
.hd-btn{width:32px;height:32px;border-radius:var(--rad-s);background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);transition:all var(--tr)}
.hd-btn:hover{background:var(--bg4);color:var(--txt)}
.hd-btn svg{width:16px;height:16px}
.ct{flex:1;padding:20px 24px}

/* ══ Screens ══ */
.scr{display:none;animation:fi .3s ease}.scr.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══ Tabs ══ */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--rad);padding:3px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 16px;border-radius:var(--rad-s);font-size:11px;font-weight:500;color:var(--txt3);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.tab:hover{color:var(--txt2)}
.tab.on{background:var(--bg);color:var(--pri);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ══ Stats ══ */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);padding:16px;position:relative;overflow:hidden;transition:all var(--tr)}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc-c,var(--pri));opacity:0;transition:opacity var(--tr)}
.sc:hover{border-color:var(--bdr2);transform:translateY(-1px)}.sc:hover::after{opacity:1}
.sc-l{font-size:11px;color:var(--txt3);margin-bottom:6px}
.sc-v{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--sc-c,var(--pri))}
.sc-d{display:inline-flex;align-items:center;gap:3px;margin-top:6px;font-size:10px;font-weight:500;padding:2px 7px;border-radius:12px}
.sc-d.up{background:var(--mint-d);color:var(--mint)}.sc-d.dn{background:var(--coral-d);color:var(--coral)}.sc-d.nt{background:rgba(100,115,150,.1);color:var(--txt3)}

/* ══ Cards ══ */
.cd{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden}
.cd-h{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.cd-t{font-size:13px;font-weight:600}.cd-b{padding:16px}

/* ══ Chart ══ */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.bars{display:flex;align-items:flex-end;gap:10px;height:150px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.br{width:100%;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--bar-c,var(--pri)),var(--sec));min-height:3px;cursor:pointer;transition:all .3s;position:relative}
.br:hover{filter:brightness(1.2);transform:scaleX(1.06)}
.br::after{content:attr(data-v);position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--txt);opacity:0;transition:opacity var(--tr)}
.br:hover::after{opacity:1}
.bl{font-size:9px;color:var(--txt3)}
.donut{width:130px;height:130px;border-radius:50%;position:relative;transition:transform .3s}
.donut:hover{transform:scale(1.04)}
.donut::after{content:'';position:absolute;top:24px;left:24px;right:24px;bottom:24px;background:var(--bg3);border-radius:50%}
.dleg{display:flex;flex-direction:column;gap:8px}
.dl{display:flex;align-items:center;gap:6px;font-size:11px}
.dd{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.dp{font-family:'JetBrains Mono',monospace;font-weight:500;margin-left:auto;font-size:11px}

/* ══ Table ══ */
.tb-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.sr{flex:1;min-width:200px;display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad-s);padding:7px 12px;transition:border-color var(--tr)}
.sr:focus-within{border-color:var(--pri)}
.sr svg{width:14px;height:14px;color:var(--txt3);flex-shrink:0}
.sr input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--txt)}
.sr input::placeholder{color:var(--txt4)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.ch{padding:5px 11px;border-radius:14px;font-size:11px;font-weight:500;background:var(--bg3);border:1px solid var(--bdr);color:var(--txt2);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.ch:hover{border-color:var(--bdr2);color:var(--txt)}.ch.on{background:var(--pri-d);border-color:var(--pri);color:var(--pri)}

/* Marketing tag chips */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;margin:1px;cursor:default}
.tag-aac{background:var(--purple-d);color:var(--purple)}
.tag-ai{background:var(--pri-d);color:var(--pri)}
.tag-proj{background:var(--mint-d);color:var(--mint)}
.tag-donate{background:var(--amber-d);color:var(--amber)}
.tag-event{background:rgba(251,146,60,.1);color:#fb923c}
.tag-news{background:rgba(129,140,248,.1);color:#818cf8}
.tag-dormant{background:var(--coral-d);color:var(--coral)}
.tag-child{background:rgba(244,114,182,.1);color:#f472b6}
.tag-org{background:rgba(148,163,184,.1);color:#94a3b8}

.dt{width:100%;border-collapse:separate;border-spacing:0}
.dt th{text-align:left;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;background:var(--bg4);border-bottom:1px solid var(--bdr)}
.dt th:first-child{border-radius:var(--rad-s) 0 0 0}.dt th:last-child{border-radius:0 var(--rad-s) 0 0}
.dt td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--bdr);transition:background var(--tr)}
.dt tbody tr{cursor:pointer}.dt tbody tr:hover td{background:var(--bg4)}
.uc2{display:flex;align-items:center;gap:8px}
.uc2 .av2{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--pri);flex-shrink:0}

/* ══ Badges ══ */
.bd{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.bd-pri{background:var(--pri-d);color:var(--pri)}.bd-mt{background:var(--mint-d);color:var(--mint)}
.bd-am{background:var(--amber-d);color:var(--amber)}.bd-co{background:var(--coral-d);color:var(--coral)}
.bd-mu{background:rgba(100,115,150,.1);color:var(--txt3)}

/* ══ Buttons ══ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rad-s);font-family:inherit;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all var(--tr)}
.btn-p{background:var(--pri);color:var(--bg)}.btn-p:hover{filter:brightness(1.1)}
.btn-g{background:transparent;color:var(--txt2);border:1px solid var(--bdr)}.btn-g:hover{background:var(--bg3);color:var(--txt)}

/* ══ Detail panel (replaces list) ══ */
.detail-view{animation:fi .25s ease}
.back{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3);cursor:pointer;margin-bottom:14px;transition:color var(--tr)}
.back:hover{color:var(--txt)}
.back svg{width:13px;height:13px}
.prof{display:flex;align-items:center;gap:16px;padding:20px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rad);margin-bottom:16px;position:relative}
.prof-av{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--bg);flex-shrink:0}
.prof-nm{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.prof-meta{color:var(--txt2);font-size:12px;margin-top:3px}
.prof-id{color:var(--txt3);font-size:11px;margin-top:2px;font-family:'JetBrains Mono',monospace}
.prof-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.prof-act{position:absolute;top:16px;right:16px;display:flex;gap:6px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ir{display:flex;padding:8px 0;border-bottom:1px solid var(--bdr)}.ir:last-child{border-bottom:none}
.il{width:90px;color:var(--txt3);font-size:11px;flex-shrink:0}.iv{font-size:12px}
.svc-sec{margin-bottom:12px}
.svc-sec-h{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg4);border-radius:var(--rad) var(--rad) 0 0;border:1px solid var(--bdr);border-bottom:none}
.svc-sec-h .dot{width:8px;height:8px;border-radius:50%}
.svc-sec-h .nm{font-size:12px;font-weight:600}
.svc-sec-b{padding:14px 16px;background:var(--bg3);border:1px solid var(--bdr);border-top:none;border-radius:0 0 var(--rad) var(--rad)}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:4px;top:6px;bottom:6px;width:1px;background:var(--bdr)}
.tl-i{position:relative;padding-bottom:14px}.tl-i:last-child{padding-bottom:0}
.tl-d{position:absolute;left:-20px;top:3px;width:8px;height:8px;border-radius:50%;border:2px solid var(--bg3)}
.tl-t{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono',monospace}.tl-e{font-size:12px;margin-top:1px}

/* Consent */
.pb{width:70px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .5s ease}

/* Pagination */
.pag{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:12px;padding:10px 0}
.pg{width:28px;height:28px;border-radius:var(--rad-s);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:transparent;border:none;color:var(--txt3);cursor:pointer;transition:all var(--tr)}
.pg:hover{background:var(--bg3);color:var(--txt)}.pg.on{background:var(--pri-d);color:var(--pri);font-weight:600}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg4);border:1px solid var(--bdr2);border-radius:var(--rad);padding:12px 18px;font-size:12px;box-shadow:0 8px 28px rgba(0,0,0,.4);transform:translateY(80px);opacity:0;transition:all .3s;z-index:200}
.toast.show{transform:translateY(0);opacity:1}

/* Activity row */
.ar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.ar:last-child{border-bottom:none}
.ar-t{width:80px;color:var(--txt3);font-size:11px;font-family:'JetBrains Mono',monospace}
.ar-e{flex:1}.ar-s{color:var(--txt3);font-size:11px}

/* Segment bar chart */
.seg-bars{display:flex;flex-direction:column;gap:8px}
.seg-row{display:flex;align-items:center;gap:10px}
.seg-label{width:110px;font-size:11px;color:var(--txt2);text-align:right;flex-shrink:0}
.seg-track{flex:1;height:20px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative}
.seg-fill{height:100%;border-radius:3px;transition:width .6s ease;display:flex;align-items:center;padding-left:6px}
.seg-fill span{font-size:9px;font-weight:600;color:var(--bg);white-space:nowrap}
.seg-val{width:50px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--txt2)}

/* version row */
.vr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.vr:last-child{border-bottom:none}
.vt{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:2px 7px;border-radius:var(--rad-s);background:var(--pri-d);color:var(--pri)}

@media(max-width:1100px){.sg{grid-template-columns:repeat(2,1fr)}.cg,.dg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">

<!-- ══════ SIDEBAR ══════ -->
<aside class="side">
  <div class="side-logo"><div class="ico">C</div><span>통합 CMS</span></div>
  <nav class="side-nav">
    <div class="nav-g">
      <div class="nav-g-label">메인</div>
      <div class="ni act" onclick="go('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>대시보드</div>
    </div>
    <div class="nav-g">
      <div class="nav-g-label">회원</div>
      <div class="ni" onclick="go('members')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>전체 회원<span class="cnt">12,847</span></div>
    </div>
    <div class="nav-g">
      <div class="nav-g-label">서비스별 회원</div>
      <div class="ni ni-sub" onclick="goSvc('home')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>대표 홈페이지<span class="cnt">8,421</span></div>
      <div class="ni ni-sub" onclick="goSvc('fair')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>FAIR AI<span class="cnt">3,210</span></div>
      <div class="ni ni-sub" onclick="goSvc('proj')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>프로젝토리<span class="cnt">5,892</span></div>
      <div class="ni ni-sub" onclick="goSvc('aac')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>나의AAC<span class="cnt">4,115</span></div>
    </div>
    <div class="nav-g">
      <div class="nav-g-label">관리</div>
      <div class="ni" onclick="go('consent')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>동의·약관 관리</div>
    </div>
  </nav>
  <div class="side-ft"><div class="uc"><div class="av">관</div><div><div class="nm">관리자</div><div class="rl">Super Admin</div></div></div></div>
</aside>

<!-- ══════ MAIN ══════ -->
<main class="mn">
<header class="hd">
  <div><div class="hd-title" id="hdT">대시보드</div><div class="hd-sub" id="hdS">통합회원 현황 개요</div></div>
  <div class="hd-r">
    <div class="hd-btn" onclick="toast('검색 기능 준비 중')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div>
    <div class="hd-btn" onclick="toast('새 알림 없음')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
  </div>
</header>
<div class="ct" id="ct"></div>
</main>
</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════ DATA ═══════════════
const SVCS = {home:'대표 홈페이지',fair:'FAIR AI',proj:'프로젝토리',aac:'나의AAC'};
const SVC_COLORS = {home:'var(--pri)',fair:'var(--acc)',proj:'var(--mint)',aac:'var(--purple)'};
const TAG_MAP = {
  'AAC 관심':{cls:'tag-aac',key:'aac_interest'},
  'AI 관심':{cls:'tag-ai',key:'ai_interest'},

function go(scr){

}

function setNav(id){
  document.querySelectorAll('.ni').forEach(n=>{

    n.classList.toggle('act',match.includes("'"+id.replace('svc-','')+"'") || (id==='dash'&&match.includes("'dash'")) || (id==='members'&&match.includes("'members'")) || (id==='consent'&&match.includes("'consent'")));

}

      }).join('')}</tbody></table>
    </div></div>
    ${pagHtml(totalP)}
  </div>`;
}

// ═══════════════ SERVICE MEMBER LIST ═══════════════
function renderSvcMembers(ct){
  const svc=S.svcView;
  if(S.detailIdx!==null) return renderDetail(ct, members[S.detailIdx]);
  const svcMembers=members.filter(m=>m.svcs[svc]);
  const filtered=getFiltered(svcMembers);
  const totalP=Math.ceil(filtered.length/PER);
  if(S.page>totalP)S.page=totalP||1;
  const slice=filtered.slice((S.page-1)*PER,S.page*PER);

  // Extra columns per service
  const extraTh=svc==='home'?'<th>기부</th><th>멤버십</th>':svc==='fair'?'<th>이용현황</th>':svc==='proj'?'<th>멤버십</th><th>서류</th>':svc==='aac'?'<th>역할</th><th>상세</th>':'';

  function extraTd(m){
    const d=m.svcs[svc];if(!d)return '';
    if(svc==='home')return `<td style="font-size:11px">${d.donation||'—'}</td><td><span class="bd bd-pri">${d.membership||'—'}</span></td>`;
    if(svc==='fair')return `<td style="font-size:11px;color:var(--txt2)">${d.usage||'—'}</td>`;
    if(svc==='proj')return `<td><span class="bd bd-mt">${d.membership||'—'}</span></td><td style="font-size:11px;color:var(--txt2)">${d.docs||'—'}</td>`;
    if(svc==='aac')return `<td style="font-size:11px">${d.role||'—'}</td><td style="font-size:11px;color:var(--txt2)">${d.child||d.device||'—'}</td>`;
    return '';
  }

  ct.innerHTML=`<div class="scr on">
    <div class="tb-bar">
      <div class="sr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input placeholder="이름, 이메일 검색..." value="${S.search}" oninput="S.search=this.value;S.page=1;render()"></div>
      <div class="chips">
        <span class="ch ${S.filter==='all'?'on':''}" onclick="S.filter='all';S.page=1;render()">전체</span>
        <span class="ch ${S.filter==='이용자'?'on':''}" onclick="S.filter='이용자';S.page=1;render()">이용자</span>
        <span class="ch ${S.filter==='후원자'?'on':''}" onclick="S.filter='후원자';S.page=1;render()">후원자</span>
        <span class="ch ${S.filter==='회원'?'on':''}" onclick="S.filter='회원';S.page=1;render()">회원</span>
      </div>
    </div>
    <div class="cd"><div class="cd-b" style="padding:0;overflow-x:auto">
      <table class="dt"><thead><tr><th>이름</th><th>이메일</th><th>유형</th><th>연동일</th>${extraTh}<th>태그</th><th>상태</th></tr></thead>
      <tbody>${slice.map(m=>{
        const ri=members.indexOf(m);
        const tc=m.type==='회원'?'bd-pri':m.type==='후원자'?'bd-am':'bd-mu';
        const sc=m.status==='활성'?'bd-mt':m.status==='휴면'?'bd-am':'bd-co';
        const jd=m.svcs[svc]?.joined||m.date;
        return `<tr onclick="S.detailIdx=${ri};render()">
          <td><div class="uc2"><div class="av2">${m.name[0]}</div>${m.name}</div></td>
          <td style="color:var(--txt2)">${m.email}</td>
          <td><span class="bd ${tc}">${m.type}</span></td>
          <td style="color:var(--txt3);font-family:'JetBrains Mono',monospace;font-size:11px">${jd}</td>
          ${extraTd(m)}
          <td>${m.tags.slice(0,2).map(t=>`<span class="tag ${TAG_MAP[t]?.cls||''}">${t}</span>`).join('')}</td>
          <td><span class="bd ${sc}">${m.status}</span></td>
        </tr>`;
      }).join('')}</tbody></table>
    </div></div>
    ${pagHtml(totalP)}
  </div>`;
}

// ═══════════════ MEMBER DETAIL ═══════════════
function renderDetail(ct, m){
  const tc=m.type==='회원'?'bd-pri':m.type==='후원자'?'bd-am':'bd-mu';
  const sc=m.status==='활성'?'bd-mt':m.status==='휴면'?'bd-am':'bd-co';

  // Service-specific sections (only connected)
  let svcSections='';
  const svcConfigs={
    home:{name:'대표 홈페이지',color:'var(--pri)',fields:m=>([['기부현황',m.donation||'없음'],['멤버십',m.membership||'—']])},
    fair:{name:'FAIR AI',color:'var(--acc)',fields:m=>([['이용현황',m.usage||'—']])},
    proj:{name:'프로젝토리',color:'var(--mint)',fields:m=>([['멤버십',m.membership||'—'],['서류상태',m.docs||'—']])},
    aac:{name:'나의AAC',color:'var(--purple)',fields:m=>([['역할',m.role||'—'],m.child?['대상아동',m.child]:m.device?['이용기기',m.device]:['상세','—']])},
  };

  Object.entries(svcConfigs).forEach(([key,cfg])=>{
    if(!m.svcs[key])return;
    const fields=cfg.fields(m.svcs[key]);
    svcSections+=`<div class="svc-sec">
      <div class="svc-sec-h"><div class="dot" style="background:${cfg.color}"></div><div class="nm">${cfg.name}</div><span class="bd bd-mt" style="margin-left:auto;font-size:9px">연동</span><span style="font-size:10px;color:var(--txt3);margin-left:4px">${m.svcs[key].joined||''}</span></div>
      <div class="svc-sec-b">${fields.map(([l,v])=>`<div class="ir"><div class="il">${l}</div><div class="iv">${v}</div></div>`).join('')}</div>
    </div>`;
  });

  // Not connected services
  const notConnected=Object.entries(SVCS).filter(([k])=>!m.svcs[k]);
  if(notConnected.length){
    svcSections+=notConnected.map(([k,name])=>`<div class="svc-sec">
      <div class="svc-sec-h" style="opacity:.4"><div class="dot" style="background:var(--txt4)"></div><div class="nm">${name}</div><span class="bd bd-mu" style="margin-left:auto;font-size:9px">미연동</span></div>
    </div>`).join('');
  }

  ct.innerHTML=`<div class="scr on detail-view">
    <div class="back" onclick="S.detailIdx=null;render()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 목록으로 돌아가기</div>
    <div class="prof">
      <div class="prof-av">${m.name[0]}</div>
      <div style="flex:1">
        <div class="prof-nm">${m.name} <span class="bd ${tc}">${m.type}</span> <span class="bd ${sc}">${m.status}</span></div>
        <div class="prof-meta">${m.email} · ${m.phone}</div>
        <div class="prof-id">통합 ID: USR-${m.date.replace(/-/g,'')}-${String(members.indexOf(m)).padStart(4,'0')}</div>
        <div class="prof-tags">${m.tags.map(t=>`<span class="tag ${TAG_MAP[t]?.cls||''}">${t}</span>`).join('')}${m.tags.length===0?'<span style="font-size:11px;color:var(--txt4)">태그 없음</span>':''}</div>
      </div>
      <div class="prof-act"><button class="btn btn-g" onclick="toast('비밀번호 초기화 메일 발송')">비밀번호 초기화</button><button class="btn btn-p" onclick="toast('편집 모드')">편집</button></div>
    </div>
    <div class="dg">
      <div class="cd"><div class="cd-h"><div class="cd-t">공통 기본정보</div></div><div class="cd-b">
        <div class="ir"><div class="il">이름</div><div class="iv">${m.name}</div></div>
        <div class="ir"><div class="il">생년월일</div><div class="iv">${m.birth}</div></div>
        <div class="ir"><div class="il">본인인증</div><div class="iv"><span class="bd bd-mt">${m.auth} 인증 완료</span></div></div>
        <div class="ir"><div class="il">연락처</div><div class="iv">${m.phone}</div></div>
        <div class="ir"><div class="il">이메일</div><div class="iv">${m.email}</div></div>
        <div class="ir"><div class="il">주소</div><div class="iv">${m.addr}</div></div>
        <div class="ir"><div class="il">가입일</div><div class="iv">${m.date}</div></div>
      </div></div>
      <div>
        <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--txt2)">서비스별 부가정보</div>
        ${svcSections}
      </div>
    </div>
    <div class="dg">
      <div class="cd"><div class="cd-h"><div class="cd-t">동의 현황</div></div><div class="cd-b" style="padding:8px 16px">
        ${['개인정보 처리방침','서비스 이용약관','마케팅 정보 수신','제3자 정보 제공','위치정보 수집'].map((c,i)=>{
          const agreed=i<2||(i===2&&m.tags.includes('뉴스레터 반응 높음'));
          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bdr)"><span style="font-size:12px">${c}</span><span class="bd ${agreed?'bd-mt':'bd-co'}">${agreed?'동의':'미동의'}</span></div>`;
        }).join('')}
      </div></div>
      <div class="cd"><div class="cd-h"><div class="cd-t">활동 이력</div></div><div class="cd-b">
        <div class="timeline">
          <div class="tl-i"><div class="tl-d" style="background:var(--pri)"></div><div class="tl-t">05-26 10:23</div><div class="tl-e">통합회원 사이트 로그인</div></div>
          <div class="tl-i"><div class="tl-d" style="background:var(--amber)"></div><div class="tl-t">05-25 14:10</div><div class="tl-e">마케팅 동의 변경</div></div>
          <div class="tl-i"><div class="tl-d" style="background:var(--mint)"></div><div class="tl-t">05-24 09:30</div><div class="tl-e">${Object.keys(m.svcs)[0]?SVCS[Object.keys(m.svcs)[0]]+' 이용':'활동 없음'}</div></div>
          <div class="tl-i"><div class="tl-d" style="background:var(--txt3)"></div><div class="tl-t">05-20 11:00</div><div class="tl-e">비밀번호 변경</div></div>
        </div>
      </div></div>
    </div>
  </div>`;
}

          <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3)">${c.ver}</td>

          <td style="color:var(--txt3);font-family:'JetBrains Mono',monospace;font-size:11px">${c.date}</td>

        <div class="ar"><div class="ar-t">10:23</div><div class="ar-e"><strong>김서연</strong> <span style="color:var(--mint)">마케팅 동의 → 동의</span></div></div>
        <div class="ar"><div class="ar-t">09:45</div><div class="ar-e"><strong>이준호</strong> <span style="color:var(--coral)">제3자 제공 → 미동의</span></div></div>
        <div class="ar"><div class="ar-t">09:12</div><div class="ar-e"><strong>박민지</strong> <span style="color:var(--mint)">위치정보 → 동의</span></div></div>
        <div class="ar"><div class="ar-t">08:30</div><div class="ar-e"><strong>정우진</strong> <span style="color:var(--coral)">마케팅 → 미동의</span></div></div>
      </div></div>
      <div class="cd"><div class="cd-h"><div class="cd-t">약관 버전 이력</div></div><div class="cd-b" style="padding:8px 16px">
        <div class="vr"><span class="vt">v3.2</span><span style="color:var(--txt3);font-size:11px;width:80px">2026-05-01</span><span>개인정보 처리방침 개정</span><span class="bd bd-mt" style="margin-left:auto">현행</span></div>
        <div class="vr"><span class="vt">v3.1</span><span style="color:var(--txt3);font-size:11px;width:80px">2026-03-15</span><span>마케팅 동의 문구 수정</span><span class="bd bd-mu" style="margin-left:auto">만료</span></div>
        <div class="vr"><span class="vt">v3.0</span><span style="color:var(--txt3);font-size:11px;width:80px">2026-01-01</span><span>통합회원 전환 적용</span><span class="bd bd-mu" style="margin-left:auto">만료</span></div>

// ═══════════════ UTILS ═══════════════
function getFiltered(list){
  let d=[...list];
  if(S.search){const q=S.search.toLowerCase();d=d.filter(m=>m.name.includes(q)||m.email.toLowerCase().includes(q));}
  if(S.filter!=='all')d=d.filter(m=>m.type===S.filter);
  if(S.tagFilter)d=d.filter(m=>m.tags.includes(S.tagFilter));
  return d;
}
function pagHtml(total){
  if(total<=1)return '';
  let h='<div class="pag">';
  for(let i=1;i<=total;i++){
    if(total>7&&i>3&&i<total-1){if(i===4)h+='<div class="pg" style="cursor:default">…</div>';continue;}
    h+=`<div class="pg ${i===S.page?'on':''}" onclick="S.page=${i};render()">${i}</div>`;
  }
  return h+'</div>';
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// Init
render();
</script>
